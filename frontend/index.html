<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AB Macros - Animal-Based Diet Tracker</title>
    <meta name="description" content="Track your macros and meals on an animal-based diet">
    
    <!-- PWA metadata -->
    <meta name="theme-color" content="#FF3D00">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* Initial loading styles */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #F7F7F7;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #F7F7F7;
            z-index: 9999;
        }
        
        .loading-title {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            color: #FF3D00;
        }
        
        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #F3F3F3;
            border-top: 5px solid #FF3D00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="loading-title">AB MACROS</div>
        <div class="loading-spinner"></div>
    </div>
    
    <div id="app"></div>
    
    <script>
        // Hide loading screen when the app is ready
        document.addEventListener('DOMContentLoaded', () => {
            const app = document.getElementById('app');
            const observer = new MutationObserver((mutations) => {
                if (app.children.length > 0) {
                    document.getElementById('loading').style.display = 'none';
                    observer.disconnect();
                }
            });
            
            observer.observe(app, { childList: true });
            
            // Fallback if app doesn't load in 5 seconds
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                observer.disconnect();
            }, 5000);
        });
    </script>
</body>
</html>
